// ─── MODAL RENOVAR ───────────────────────────────────────────────────────────
const RenovarModal = ({ cliente, contratoActual, onClose, onSaved }) => {
  const [planes, setPlanes] = useState([]);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState('');
  const [form, setForm] = useState({
    plan_id:contratoActual?.plan_id||'', canal:contratoActual?.canal||'ONLINE',
    fecha_inicio:'', fecha_fin:'',
    precio_eur:contratoActual?.precio_eur||0, precio_usd:contratoActual?.precio_usd||0,
    comision_banco_eur:contratoActual?.comision_banco_eur||0, comision_banco_usd:contratoActual?.comision_banco_usd||0,
    metodo_pago:contratoActual?.metodo_pago||'Stripe', divisa_principal:contratoActual?.divisa_principal||'EUR',
  });
  useEffect(()=>{ window._sb.from('planes').select('id,nombre,precio_eur,precio_usd').eq('activo',true).order('nombre').then(({data})=>setPlanes(data||[])); },[]);
  const sf = (k,v) => setForm(f=>({...f,[k]:v}));
  const SS = FLD_SS;

  const save = async () => {
    if (!form.fecha_inicio || !form.fecha_fin) { setError('Las fechas son obligatorias.'); return; }
    setSaving(true); setError('');
    if (contratoActual?.id) await window._sb.from('contratos').update({estado:'inactivo'}).eq('id',contratoActual.id);
    const { error: err } = await window._sb.from('contratos').insert({
      cliente_id:cliente?.id, plan_id:form.plan_id||null, canal:form.canal,
      precio_eur:Number(form.precio_eur)||0, precio_usd:Number(form.precio_usd)||0,
      comision_banco_eur:Number(form.comision_banco_eur)||0, comision_banco_usd:Number(form.comision_banco_usd)||0,
      metodo_pago:form.metodo_pago, divisa_principal:form.divisa_principal,
      fecha_inicio:form.fecha_inicio, fecha_fin:form.fecha_fin, estado:'activo',
      entrenador_id:contratoActual?.entrenador_id||null, setter_id:contratoActual?.setter_id||null,
      porcentaje_comision_setter:contratoActual?.porcentaje_comision_setter||null,
      canal_cierre:contratoActual?.canal_cierre||null,
    });
    setSaving(false);
    if (err) { setError(err.message); return; }
    onSaved?.(); onClose();
  };

  return (
    <ModalShell title="Renovar" italic="contrato" onClose={onClose} maxWidth={600}
      footer={<>
        <button className="ghost-btn" onClick={onClose}>Cancelar</button>
        <button onClick={save} disabled={saving} style={{padding:'10px 18px',fontSize:13,fontWeight:500,borderRadius:8,background:'var(--ink)',color:'#fff',display:'inline-flex',alignItems:'center',gap:8,border:'none',cursor:'pointer'}}>{saving?'Guardando…':'Confirmar renovación'}</button>
      </>}
    >
      {contratoActual && (
        <div style={{padding:'12px 14px',background:'var(--bg-2)',borderRadius:10,marginBottom:18}}>
          <div style={{fontSize:10,letterSpacing:'0.16em',textTransform:'uppercase',color:'var(--ink-faint)',marginBottom:4}}>Contrato actual</div>
          <div style={{display:'flex',gap:18,flexWrap:'wrap',fontSize:13}}>
            <span><b style={{color:'var(--ink)'}}>{contratoActual?.planes?.nombre||'—'}</b></span>
            <span style={{color:'var(--ink-faint)'}}>Inicio: {contratoActual?.fecha_inicio||'—'}</span>
            <span style={{color:'var(--ink-faint)'}}>Fin: {contratoActual?.fecha_fin||'—'}</span>
          </div>
        </div>
      )}
      {error && <div style={{padding:'10px 14px',background:'#fdf0ee',border:'1px solid #f5d0c8',borderRadius:8,marginBottom:16,fontSize:13,color:'var(--neg)'}}>{error}</div>}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        <div style={{gridColumn:'span 2',display:'flex',flexDirection:'column',gap:6}}>
          <FLbl t="Plan"/>
          <select value={form.plan_id} onChange={e=>{ const p=planes.find(x=>x.id===e.target.value); setForm(f=>({...f, plan_id:e.target.value, ...(p?{precio_eur:p.precio_eur??f.precio_eur, precio_usd:p.precio_usd??f.precio_usd}:{})})); }} style={SS}>
            <option value="">— Mismo plan</option>
            {planes.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}
          </select>
        </div>
        <FF label="Nueva fecha inicio" val={form.fecha_inicio} onCh={v=>sf('fecha_inicio',v)} type="date"/>
        <FF label="Nueva fecha fin" val={form.fecha_fin} onCh={v=>sf('fecha_fin',v)} type="date"/>
        <FF label="Precio EUR" val={form.precio_eur} onCh={v=>sf('precio_eur',v)} type="number"/>
        <FF label="Precio USD" val={form.precio_usd} onCh={v=>sf('precio_usd',v)} type="number"/>
        <FF label="Comisión banco EUR" val={form.comision_banco_eur} onCh={v=>sf('comision_banco_eur',v)} type="number"/>
        <FF label="Comisión banco USD" val={form.comision_banco_usd} onCh={v=>sf('comision_banco_usd',v)} type="number"/>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          <FLbl t="Método de pago"/>
          <select value={form.metodo_pago} onChange={e=>sf('metodo_pago',e.target.value)} style={SS}>
            {['Stripe','Zelle','Transferencia','Bizum','Cash','Skool Payment','Otro'].map(m=><option key={m}>{m}</option>)}
          </select>
        </div>
      </div>
    </ModalShell>
  );
};

const UpgradeModal = ({ cliente, contratoActual, onClose, onSaved }) => {
  const [planes, setPlanes] = useState([]);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState('');
  const [form, setForm] = useState({ plan_id:'', precio_diferencia_eur:0, precio_diferencia_usd:0, comision_banco_eur:0, comision_banco_usd:0, fecha_inicio_nueva:'', fecha_fin_nueva:'' });
  useEffect(()=>{ window._sb.from('planes').select('id,nombre,precio_eur,precio_usd').eq('activo',true).order('nombre').then(({data})=>setPlanes(data||[])); },[]);
  const sf = (k,v) => setForm(f=>({...f,[k]:v}));
  const SS = FLD_SS;

  const save = async () => {
    setSaving(true); setError('');
    const { error: err } = await window._sb.from('upgrades').insert({
      contrato_original_id:contratoActual?.id||null, cliente_id:cliente?.id,
      plan_nuevo_id:form.plan_id||null,
      precio_diferencia_eur:Number(form.precio_diferencia_eur)||0,

        <FF label="Comisión banco EUR" val={form.comision_banco_eur} onCh={v=>sf('comision_banco_eur',v)} type="number"/>

// ─── MODAL BAJA ──────────────────────────────────────────────────────────────
const BajaModal = ({ cliente, contratoActual, onClose, onSaved }) => {
  const [motivo, setMotivo] = useState('');
  const [confirm, setConfirm] = useState(false);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState('');

  const save = async () => {
    setSaving(true); setError('');
    const ops = [window._sb.from('clientes').update({activo:false}).eq('id',cliente?.id)];
    if (contratoActual?.id) ops.push(window._sb.from('contratos').update({estado:'cancelado',motivo_baja:motivo||null}).eq('id',contratoActual.id));
    const results = await Promise.all(ops);
    const err = results.find(r=>r.error)?.error;
    setSaving(false);
    if (err) { setError(err.message); return; }
    onSaved?.(); onClose();
  };

  return (
    <ModalShell title="Dar de" italic="baja" onClose={onClose} maxWidth={480}
      footer={<>
        <button className="ghost-btn" onClick={onClose}>Cancelar</button>
        <button onClick={save} disabled={saving||!confirm} style={{padding:'10px 18px',fontSize:13,fontWeight:500,borderRadius:8,background:'#b04425',color:'#fff',display:'inline-flex',alignItems:'center',gap:8,border:'none',opacity:(saving||!confirm)?0.5:1,cursor:(saving||!confirm)?'not-allowed':'pointer'}}>{saving?'Procesando…':'Confirmar baja'}</button>
      </>}
    >
      <div style={{padding:'12px 14px',background:'#fbeee8',borderRadius:10,marginBottom:18,fontSize:13,color:'#7a2e18',border:'1px solid #e8c9bd'}}>
        El cliente quedará inactivo y su contrato se marcará como cancelado. Podrás reactivarlo desde su ficha.
      </div>
      {error && <div style={{padding:'10px 14px',background:'#fdf0ee',border:'1px solid #f5d0c8',borderRadius:8,marginBottom:16,fontSize:13,color:'var(--neg)'}}>{error}</div>}
      <div style={{display:'grid',gap:14}}>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          <span style={{fontSize:10,letterSpacing:'0.16em',textTransform:'uppercase',color:'var(--ink-faint)'}}>Motivo de baja</span>
          <textarea value={motivo} onChange={e=>setMotivo(e.target.value)} placeholder="¿Por qué se da de baja? (opcional)" style={{padding:'10px 12px',background:'var(--bg-1)',border:'1px solid var(--line)',borderRadius:8,fontSize:13,outline:'none',fontFamily:'inherit',minHeight:80,resize:'vertical'}}/>
        </div>
        <label style={{display:'flex',alignItems:'center',gap:10,fontSize:13,color:'var(--ink-dim)',cursor:'pointer'}}>
          <input type="checkbox" checked={confirm} onChange={e=>setConfirm(e.target.checked)} style={{width:16,height:16,accentColor:'#b04425'}}/>
          Entiendo que esta acción desactiva al cliente.
        </label>
      </div>
    </ModalShell>
  );
};

// ─── DELIVERY ENTREGAS ───────────────────────────────────────────────────────
const DeliveryEntregas = () => {
  const [clientes, setClientes] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    const load = async () => {
      setLoading(true);
      const { data } = await window._sb.from('clientes').select('*, dietas(id,nombre,archivo_url,activa)').eq('servicio_comida',true).eq('activo',true).order('nombre');
      setClientes(data||[]);
      setLoading(false);
    };
    load();
  },[]);

  const today = new Date();
  const mon = new Date(today); mon.setDate(today.getDate() - ((today.getDay()+6)%7));
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const fd = d => d.toLocaleDateString('es-ES',{day:'numeric',month:'long'});

  return (
    <div className="page">
      <div className="page-header">
        <div>
          <div className="page-eyebrow">Comidas Delivery · Entregas</div>
          <h1 className="page-title">Entregas <span className="italic">semanales</span></h1>
        </div>
        <div className="page-meta"><span className="dot"/><span>Semana del {fd(mon)} – {fd(sun)}</span></div>
      </div>
      <div className="filters">
        <div className="filter-spacer"/>
        <button className="ghost-btn"><Icon name="download" size={14}/> Exportar ruta</button>
      </div>
      <div className="panel">
        <div className="panel-head">
          <h2 className="panel-title">Clientes con <span className="italic">servicio activo</span></h2>
          <span className="panel-sub">{clientes.length} clientes</span>
        </div>
        <div className="table-wrap">
          {loading ? <div className="loading">Cargando…</div> : clientes.length===0 ? (
            <div style={{padding:'60px',textAlign:'center'}}>
              <div className="empty-icon" style={{margin:'0 auto 16px'}}><Icon name="box" size={24}/></div>
              <div style={{fontFamily:'var(--font-serif)',fontSize:24,color:'var(--ink)',marginBottom:8}}>Sin clientes con <span style={{fontStyle:'italic',color:'var(--stone-muted)'}}>servicio</span></div>
              <div style={{fontSize:13,color:'var(--ink-faint)',maxWidth:360,margin:'0 auto'}}>Activa el servicio de comida en la ficha de un cliente para verlo aquí.</div>
            </div>
          ) : (
            <table className="data-table">
              <thead><tr><th style={{width:'25%'}}>Cliente</th><th>Dirección</th><th>Dieta asignada</th><th style={{textAlign:'right'}}>Archivo</th></tr></thead>
              <tbody>
                {clientes.map(c=>{
                  const dieta = c.dietas?.find(d=>d.activa);
                  return (
                    <tr key={c.id}>
                      <td className="name"><span className="avatar-sm">{initials(c.nombre)}</span>{c.nombre}<span className="sub">{c.email}</span></td>
                      <td style={{color:'var(--ink-dim)'}}>{c.direccion||<span style={{color:'var(--neg)'}}>Sin dirección</span>}</td>
                      <td>{dieta?dieta.nombre:<span style={{color:'var(--ink-faint)'}}>Sin dieta asignada</span>}</td>
                      <td style={{textAlign:'right'}}>
                        {dieta?.archivo_url
                          ? <a href={dieta.archivo_url} target="_blank" rel="noopener noreferrer" className="ghost-btn" style={{fontSize:11,display:'inline-flex'}}>Ver PDF</a>
                          : <span style={{color:'var(--ink-faint)',fontFamily:'var(--font-mono)',fontSize:12}}>—</span>
                        }
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      </div>
    </div>
  );
};

                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {showAdd && (
        <div style={{padding:'20px',background:'var(--bg-1)',border:'1px solid var(--line)',borderRadius:12,marginBottom:20}}>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr auto auto',gap:10,alignItems:'end'}}>

              <input value={newForm.nombre} onChange={e=>setNewForm(f=>({...f,nombre:e.target.value}))} placeholder="Nombre (opcional)" style={{width:'100%',padding:'9px 12px',background:'var(--bg)',border:'1px solid var(--line)',borderRadius:8,fontSize:13,fontFamily:'inherit',outline:'none'}}/>

                  </td></tr>
                ) : perfiles.map(p=>(
                  <tr key={p.id}>
                    <td className="name">

// ─── EQUIPO TABLA ────────────────────────────────────────────────────────────
const EquipoTabla = ({ tipo }) => {
  const [items, setItems] = useState([]);
  const [counts, setCounts] = useState({});
  const [loading, setLoading] = useState(true);
  const [showAdd, setShowAdd] = useState(false);
  const [newNombre, setNewNombre] = useState('');
  const [newCoste, setNewCoste] = useState('');
  const [saving, setSaving] = useState(false);
  const table = tipo==='entrenadores' ? 'entrenadores' : 'setters';
  const labelPlural = tipo==='entrenadores' ? 'Entrenadores' : 'Setters';
  const labelSing = tipo==='entrenadores' ? 'entrenador' : 'setter';

  const load = useCallback(async () => {
    setLoading(true);
    const [ir, cr] = await Promise.all([
      window._sb.from(table).select('*').order('nombre'),
      tipo==='entrenadores'
        ? window._sb.from('contratos').select('entrenador_id').eq('estado','activo')
        : window._sb.from('contratos').select('setter_id').not('setter_id','is',null),
    ]);
    const c = {};
    (cr.data||[]).forEach(x=>{ const id = tipo==='entrenadores'?x.entrenador_id:x.setter_id; if(id) c[id]=(c[id]||0)+1; });
    setItems(ir.data||[]);
    setCounts(c);
    setLoading(false);
  }, [tipo]);

  useEffect(()=>{ load(); },[load]);

  const toggle = async (item) => {
    await window._sb.from(table).update({activo:!item.activo}).eq('id',item.id);
    load();
  };

  const eliminar = async (item) => {
    if (!confirm(`¿Eliminar a ${item.nombre}? Esta acción no se puede deshacer.`)) return;
    await window._sb.from(table).delete().eq('id',item.id);
    load();
  };

  const añadir = async () => {
    if (!newNombre.trim()) return;
    setSaving(true);
    const row = tipo==='entrenadores'
      ? { nombre: newNombre.trim(), activo: true, coste_hora_usd: Number(newCoste)||null }
      : { nombre: newNombre.trim(), activo: true, comision_chat: 10, comision_llamada: 5 };
    await window._sb.from(table).insert(row);
    setNewNombre(''); setNewCoste('');
    setShowAdd(false);
    setSaving(false);
    load();
  };

  return (
    <div className="page">
      <div className="page-header">
        <div>
          <div className="page-eyebrow">Equipo · {labelPlural}</div>
          <h1 className="page-title">{labelPlural} <span className="italic">del equipo</span></h1>
        </div>
        <button onClick={()=>setShowAdd(true)} style={{padding:'10px 18px',fontSize:13,fontWeight:500,borderRadius:8,background:'var(--ink)',color:'#fff',display:'inline-flex',alignItems:'center',gap:8}}>
          <Icon name="plus" size={13}/> Añadir {labelSing}
        </button>
      </div>

      {showAdd && (
        <div style={{padding:'18px 20px',background:'var(--bg-1)',border:'1px solid var(--line)',borderRadius:12,marginBottom:20,display:'flex',alignItems:'center',gap:12}}>
          <input autoFocus value={newNombre} onChange={e=>setNewNombre(e.target.value)} onKeyDown={e=>e.key==='Enter'&&añadir()} placeholder={`Nombre del ${labelSing}…`} style={{flex:1,padding:'9px 12px',background:'var(--bg)',border:'1px solid var(--line)',borderRadius:8,fontSize:13,fontFamily:'inherit',outline:'none'}}/>
          {tipo==='entrenadores' && <input type="number" value={newCoste} onChange={e=>setNewCoste(e.target.value)} placeholder="Coste/hora $" style={{width:140,padding:'9px 12px',background:'var(--bg)',border:'1px solid var(--line)',borderRadius:8,fontSize:13,fontFamily:'inherit',outline:'none'}}/>}
          <button onClick={añadir} disabled={saving} style={{padding:'9px 16px',background:'var(--ink)',color:'#fff',borderRadius:8,fontSize:13,fontWeight:500}}>{saving?'Guardando…':'Guardar'}</button>
          <button onClick={()=>{setShowAdd(false);setNewNombre('');}} className="ghost-btn">Cancelar</button>
        </div>
      )}

      <div className="panel">
        <div className="panel-head">
          <h2 className="panel-title">Miembros <span className="italic">del equipo</span></h2>
          <span className="panel-sub">{items.filter(i=>i.activo).length} activos</span>
        </div>
        <div className="table-wrap">
          {loading ? <div className="loading">Cargando…</div> : (
            <table className="data-table">
              <thead>
                <tr>
                  <th style={{width:'35%'}}>Nombre</th>
                  <th>Estado</th>
                  {tipo==='setters' && <><th style={{textAlign:'right'}}>% Chat</th><th style={{textAlign:'right'}}>% Llamada</th></>}
                  {tipo==='entrenadores' && <th style={{textAlign:'right'}}>Coste/hora</th>}
                  <th style={{textAlign:'right'}}>Clientes activos</th>
                  <th style={{width:120}}></th>
                </tr>
              </thead>
              <tbody>
                {items.length===0 ? (
                  <tr><td colSpan={tipo==='setters'?6:5} style={{padding:'48px',textAlign:'center'}}>
                    <div className="empty-icon" style={{margin:'0 auto 14px'}}><Icon name="team" size={22}/></div>
                    <div style={{fontFamily:'var(--font-serif)',fontSize:22,color:'var(--ink)',marginBottom:4}}>Sin {labelPlural.toLowerCase()}</div>
                  </td></tr>
                ) : items.map(item=>(
                  <tr key={item.id}>
                    <td className="name"><span className="avatar-sm">{initials(item.nombre)}</span>{item.nombre}</td>
                    <td><span className={`chip ${item.activo?'activo':'inactivo'}`}>{item.activo?'Activo':'Inactivo'}</span></td>
                    {tipo==='setters' && <>
                      <td style={{textAlign:'right',fontFamily:'var(--font-mono)'}}>{item.comision_chat||0}%</td>
                      <td style={{textAlign:'right',fontFamily:'var(--font-mono)'}}>{item.comision_llamada||0}%</td>
                    </>}
                    {tipo==='entrenadores' && <td style={{textAlign:'right',fontFamily:'var(--font-mono)'}}>{item.coste_hora_usd?'$'+item.coste_hora_usd:'—'}</td>}
                    <td style={{textAlign:'right',fontFamily:'var(--font-mono)'}}>{counts[item.id]||0}</td>
                    <td style={{textAlign:'right',display:'flex',gap:6,justifyContent:'flex-end'}}>
                      <button className="ghost-btn" style={{fontSize:12,padding:'5px 10px'}} onClick={()=>toggle(item)}>
                        {item.activo?'Desactivar':'Activar'}
                      </button>
                      <button className="ghost-btn" style={{fontSize:12,padding:'5px 8px',color:'var(--neg)'}} onClick={()=>eliminar(item)}>
                        <Icon name="trash" size={13}/>
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      </div>
    </div>
  );
};

    .eq('activo', true).order('nombre').then(({ data }) => setClientes(data || []));
  useEffect(() => { load(); }, []);
  const sel = clientes.find(c => c.id === selId) || null;
  const contratoActual = sel ? (sel.contratos?.find(c => c.estado === 'activo') || sel.contratos?.[0] || null) : null;

  const tabs = [
    { id: 'alta', label: 'Nuevo cliente' },
    { id: 'renovar', label: 'Renovar' },
    { id: 'upgrade', label: 'Upgrade' },
    { id: 'baja', label: 'Dar de baja' },
  ];
  const SS = { padding: '10px 12px', background: 'var(--bg-1)', border: '1px solid var(--line)', borderRadius: 8, fontSize: 13, fontFamily: 'inherit', width: '100%', appearance: 'none' };
  const picker = (verbo, btnColor) => (
    <div className="panel"><div className="panel-body" style={{ display: 'flex', flexDirection: 'column', gap: 16, maxWidth: 520 }}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        <span style={{ fontSize: 10, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--ink-faint)' }}>Cliente</span>
        <select value={selId} onChange={e => setSelId(e.target.value)} style={SS}><option value="">— Selecciona un cliente —</option>{clientes.map(c => <option key={c.id} value={c.id}>{c.nombre}</option>)}</select>
      </div>
      {sel && contratoActual && <div style={{ fontSize: 12, color: 'var(--ink-faint)' }}>Plan actual: <b style={{ color: 'var(--ink)' }}>{contratoActual.planes?.nombre || '—'}</b> · vence {contratoActual.fecha_fin || '—'}</div>}
      <button disabled={!sel} onClick={() => setModal(tab)} style={{ padding: '12px 20px', fontSize: 14, fontWeight: 600, borderRadius: 10, background: btnColor, color: '#fff', border: 'none', opacity: sel ? 1 : 0.4, cursor: sel ? 'pointer' : 'not-allowed', alignSelf: 'flex-start' }}>{verbo}</button>
    </div></div>
  );

  return (
    <div className="page">
      <div className="page-header">
        <div><div className="page-eyebrow">Negocio · Clientes</div><h1 className="page-title">Formulario de <span className="italic">clientes</span></h1></div>
      </div>
      <div style={{ display: 'flex', gap: 8, marginBottom: 20, flexWrap: 'wrap' }}>
        {tabs.map(t => <button key={t.id} onClick={() => { setTab(t.id); setModal(null); }} style={{ padding: '9px 16px', fontSize: 13, fontWeight: 500, borderRadius: 8, border: '1px solid var(--line)', background: tab === t.id ? 'var(--ink)' : 'var(--bg-1)', color: tab === t.id ? '#fff' : 'var(--ink-dim)', cursor: 'pointer' }}>{t.label}</button>)}
      </div>
      {tab === 'alta' && (
        <div className="panel"><div className="panel-body" style={{ maxWidth: 520 }}>
          <p style={{ fontSize: 14, color: 'var(--ink-dim)', marginBottom: 16 }}>Da de alta un cliente nuevo con todos sus datos (plan, precio, fechas, entrenador, setter, objetivo…).</p>
          <button onClick={() => setRoute('clientes/nuevo')} style={{ padding: '12px 20px', fontSize: 14, fontWeight: 600, borderRadius: 10, background: 'var(--ink)', color: '#fff', border: 'none', cursor: 'pointer' }}>+ Crear cliente nuevo</button>
        </div></div>
      )}
      {tab === 'renovar' && picker('Renovar', '#b07a2a')}
      {tab === 'upgrade' && picker('Hacer upgrade', '#c9a227')}
      {tab === 'baja' && picker('Dar de baja', '#b04425')}

      {modal === 'renovar' && sel && <RenovarModal cliente={sel} contratoActual={contratoActual} onClose={() => setModal(null)} onSaved={() => { load(); setModal(null); }} />}
      {modal === 'upgrade' && sel && <UpgradeModal cliente={sel} contratoActual={contratoActual} onClose={() => setModal(null)} onSaved={() => { load(); setModal(null); }} />}
      {modal === 'baja' && sel && <BajaModal cliente={sel} contratoActual={contratoActual} onClose={() => setModal(null)} onSaved={() => { load(); setSelId(''); setModal(null); }} />}
    </div>
  );
};

const MetricsPanel = ({ open, onToggle }) => {
  const [contratos, setContratos] = useState([]);
  const [gastos, setGastos] = useState([]);
  const [editores, setEditores] = useState([]);
  useEffect(() => { (async () => {
    const { data: cs } = await window._sb.from('contratos').select('precio_eur,precio_usd,fecha_inicio,estado,canal,horas_semana');
    setContratos(cs || []);
    const { data: gs } = await window._sb.from('gastos').select('importe_eur,importe_usd,frecuencia');
    setGastos(gs || []);
    const { data: eds } = await window._sb.from('editores_video').select('pago_mensual,divisa').eq('activo', true);
    setEditores(eds || []);
  })(); }, []);

  if (!open) return (
    <aside className="metrics-panel collapsed">
      <button className="mp-toggle" onClick={onToggle} title="Mostrar resumen en vivo">‹</button>
    </aside>
  );

  const now = new Date();
  const y = now.getFullYear(), mo = now.getMonth();
  const pad = n => String(n).padStart(2, '0');
  const todayStr = `${y}-${pad(mo + 1)}-${pad(now.getDate())}`;
  const weekAgo = new Date(now); weekAgo.setDate(now.getDate() - 7);
  const di = c => c.fecha_inicio ? new Date(c.fecha_inicio) : null;
  const sumE = arr => arr.reduce((s, c) => s + (c.precio_eur || 0), 0);
  const sumU = arr => arr.reduce((s, c) => s + (c.precio_usd || 0), 0);
  const r0 = n => Math.round(n);

  const mesC = contratos.filter(c => { const d = di(c); return d && d.getFullYear() === y && d.getMonth() === mo; });
  const hoyC = contratos.filter(c => c.fecha_inicio === todayStr);
  const semC = contratos.filter(c => { const d = di(c); return d && d >= weekAgo && d <= now; });
  const activos = contratos.filter(c => c.estado === 'activo').length;
  const mesE = sumE(mesC), mesU = sumU(mesC);
  const edE = editores.filter(e => e.divisa === 'EUR').reduce((s, e) => s + (e.pago_mensual || 0), 0);
  const edU = editores.filter(e => e.divisa !== 'EUR').reduce((s, e) => s + (e.pago_mensual || 0), 0);
  const gMesE = gastos.filter(g => g.frecuencia === 'MENSUAL').reduce((s, g) => s + (g.importe_eur || 0), 0) + edE;
  const gMesU = gastos.filter(g => g.frecuencia === 'MENSUAL').reduce((s, g) => s + (g.importe_usd || 0), 0) + edU;
  const benE = mesE - gMesE, benU = mesU - gMesU;
  // Valor por hora presencial: facturación presencial activa / horas presenciales al mes
  const presAct = contratos.filter(c => c.estado === 'activo' && c.canal === 'PRESENCIAL');
  const horasMes = presAct.reduce((s, c) => s + (Number(c.horas_semana) || 0), 0) * 4.33;
  const presIngreso = presAct.reduce((s, c) => s + (c.precio_eur || 0) + (c.precio_usd || 0), 0);
  const valorHora = horasMes > 0 ? presIngreso / horasMes : 0;

  const meses = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
  const last6 = [];
  for (let i = 5; i >= 0; i--) { const d = new Date(y, mo - i, 1); last6.push({ y: d.getFullYear(), m: d.getMonth() }); }
  const barVals = last6.map(({ y: yy, m: mm }) => contratos.filter(c => { const d = di(c); return d && d.getFullYear() === yy && d.getMonth() === mm; }).reduce((s, c) => s + (c.precio_eur || 0) + (c.precio_usd || 0), 0));
  const maxBar = Math.max(...barVals, 1);

  return (
    <aside className="metrics-panel">
      <div className="mp-head" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}><span>Resumen en vivo</span><button className="mp-toggle" onClick={onToggle} title="Minimizar">›</button></div>
      <div className="mp-card hero">
        <div className="mp-label">Facturado este mes</div>
        <div className="mp-value">{r0(mesE)}<span className="u">€</span> · {r0(mesU)}<span className="u">$</span></div>
        <div className="mp-sub" style={{ color: 'rgba(255,255,255,0.55)' }}>{meses[mo]} {y} · {mesC.length} ventas</div>
      </div>
      <div className="mp-row">
        <div className="mp-card"><div className="mp-label">Hoy</div><div className="mp-value">{r0(sumE(hoyC))}€</div><div className="mp-sub">${r0(sumU(hoyC))}</div></div>
        <div className="mp-card"><div className="mp-label">Esta semana</div><div className="mp-value">{r0(sumE(semC))}€</div><div className="mp-sub">${r0(sumU(semC))}</div></div>
      </div>
      <div className="mp-card">
        <div className="mp-label">Media mensual</div>
        <div className="mp-mini"><span>Al día</span><b>{r0(mesE / 30)}€ · ${r0(mesU / 30)}</b></div>
        <div className="mp-mini"><span>A la semana</span><b>{r0(mesE / 4.3)}€ · ${r0(mesU / 4.3)}</b></div>
        <div className="mp-mini"><span>Al mes</span><b>{r0(mesE)}€ · ${r0(mesU)}</b></div>
      </div>
      <div className="mp-card">
        <div className="mp-label">Gastos fijos / mes</div>
        <div className="mp-value">{r0(gMesE)}<span className="u">€</span> · {r0(gMesU)}<span className="u">$</span></div>
      </div>
      <div className="mp-card">
        <div className="mp-label">Beneficio del mes</div>
        <div className={'mp-value' + ((benE < 0 || benU < 0) ? ' neg' : '')}>{r0(benE)}<span className="u">€</span> · {r0(benU)}<span className="u">$</span></div>
        <div className="mp-sub">{activos} clientes activos</div>
      </div>
      <div className="mp-card">
        <div className="mp-label">Valor de tu hora (presencial)</div>
        <div className="mp-value">{horasMes > 0 ? r0(valorHora) : '—'}<span className="u">/h</span></div>
        <div className="mp-sub">{horasMes > 0 ? `${r0(horasMes)} h/mes presencial` : 'mete las horas en cada cliente'}</div>
      </div>
      <div className="mp-card mp-wide">
        <div className="mp-label">Facturación · últimos 6 meses</div>
        <div className="mp-bars">
          {barVals.map((v, i) => (
            <div className="mp-bar-wrap" key={i}>
              <div className="mp-bar" style={{ height: Math.max(2, v / maxBar * 48) }}></div>
              <div className="mp-bar-lbl">{meses[last6[i].m]}</div>
            </div>
          ))}
        </div>
      </div>
    </aside>
  );
};

const App = () => {
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);
  const [perfil, setPerfil] = useState(null);
  const [route, setRoute] = useState('dashboard/general');
  const [mobileOpen, setMobileOpen] = useState(false);
  const [selectedCliente, setSelectedCliente] = useState(null);
  const [panelOpen, setPanelOpen] = useState(()=>localStorage.getItem('af_panel')!=='0');
  const togglePanel = () => setPanelOpen(o=>{ const n=!o; localStorage.setItem('af_panel', n?'1':'0'); return n; });

  useEffect(()=>{
    const loadPerfil = async (u) => {
      let { data } = await window._sb.from('perfiles').select('*').eq('user_id', u.id).maybeSingle();
      if (!data) {
        const r = await window._sb.from('perfiles').select('*').eq('email', u.email).maybeSingle();
        data = r.data;
        if (data && !data.user_id) {
          await window._sb.from('perfiles').update({ user_id: u.id }).eq('email', u.email);
          data = { ...data, user_id: u.id };
        }
      }
      setPerfil(data);
      if (data) {
        const allowed = getNavForRole(data.rol).flatMap(g => g.items.map(i => i.id));
        setRoute(cur => allowed.includes(cur) ? cur : (getNavForRole(data.rol)[0]?.items[0]?.id || 'delivery/clientes'));
      }
    };

    window._sb.auth.getSession().then(({data:{session}})=>{
      const u = session?.user||null;
      setUser(u);
      if (u) loadPerfil(u);
      setChecking(false);
    });
    const { data: { subscription } } = window._sb.auth.onAuthStateChange((_,session)=>{
      const u = session?.user||null;
      setUser(u);
      if (u) loadPerfil(u);
      else setPerfil(null);
    });
    return ()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    localStorage.setItem('af_route', route);
    document.querySelector('.main')?.scrollTo(0,0);
  },[route]);

  const logout = async ()=>{ await window._sb.auth.signOut(); };

  if (checking) return <div className="loading" style={{height:'100vh'}}>Cargando…</div>;
  if (!user) return <Login onLogin={setUser}/>;

  const renderPage = () => {
    switch(route) {
      case 'dashboard/general': return <DashboardGeneral/>;
      case 'dashboard/online': return <DashboardCanal canal="ONLINE" nombre="Online coaching" eyebrow="Online"/>;
      case 'dashboard/presencial': return <DashboardCanal canal="PRESENCIAL" nombre="Presencial studio" eyebrow="Presencial"/>;
      case 'dashboard/skool': return <DashboardCanal canal="SKOOL" nombre="Skool community" eyebrow="Skool"/>;
      case 'clientes/lista': return <ClientesLista setRoute={setRoute} setSelectedCliente={setSelectedCliente}/>;
      case 'clientes/nuevo': return <NuevoCliente setRoute={setRoute}/>;
      case 'clientes/ficha': return <FichaCliente cliente={selectedCliente} setRoute={setRoute} onClienteUpdated={()=>setSelectedCliente(c=>c?{...c,activo:false}:c)}/>;
      case 'clientes/vencimientos': return <Vencimientos setRoute={setRoute} setSelectedCliente={setSelectedCliente}/>;
      case 'clientes/etiquetas': return <EtiquetasClientes setRoute={setRoute} setSelectedCliente={setSelectedCliente}/>;
      case 'clientes/formulario': return <FormularioClientes setRoute={setRoute}/>;
      case 'clientes-ent/lista': return <ClientesListaEntrenador setRoute={setRoute} setSelectedCliente={setSelectedCliente}/>;
      case 'clientes-ent/vencimientos': return <Vencimientos setRoute={setRoute} setSelectedCliente={setSelectedCliente}/>;
      case 'clientes-ent/etiquetas': return <EtiquetasClientes setRoute={setRoute} setSelectedCliente={setSelectedCliente}/>;
      case 'delivery/clientes': return <DeliveryClientes setRoute={setRoute} setSelectedCliente={setSelectedCliente}/>;
      case 'delivery/entregas': return <DeliveryEntregas/>;
      case 'equipo/entrenadores': return <EquipoTabla tipo="entrenadores"/>;
      case 'equipo/setters': return <EquipoTabla tipo="setters"/>;
      case 'equipo/editores': return <EditoresVideo/>;
      case 'libreria/programas': return <Programas/>;
      case 'equipo/roles': return <RolesPermisos/>;

      case 'economia/facturacion': return <EconomiaFacturacion/>;
      case 'economia/gastos': return <EconomiaGastos/>;
      case 'economia/comisiones-entrenadores': return <ComisionesEntrenadores/>;
      case 'economia/comisiones-setters': return <ComisionesSetters/>;
      case 'ajustes/servicios': return <Servicios/>;
      default: return <GenericEmpty route={route}/>;
    }
  };

  const showPanel = perfil && ['founder','admin'].includes(perfil.rol) && route !== 'economia/facturacion';
  return (
    <div className={'app'+(showPanel?(panelOpen?' has-panel':' has-panel-min'):'')}>
      <Sidebar route={route} setRoute={setRoute} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen} user={user} onLogout={logout} perfil={perfil}/>
      <main className="main">
        <Topbar route={route} onMenu={()=>setMobileOpen(true)}/>
        {renderPage()}
      </main>
      {showPanel && <MetricsPanel open={panelOpen} onToggle={togglePanel}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
