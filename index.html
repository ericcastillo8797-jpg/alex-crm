// ─── SESIONES PRESENCIALES (parte de Adrián) ─────────────────────────────────
const SesionesPresenciales = () => {
  const [contratos, setContratos] = useState([]);
  const [entrenadores, setEntrenadores] = useState([]);
  const [sesiones, setSesiones] = useState([]);
  const [loading, setLoading] = useState(true);
  const [needsSetup, setNeedsSetup] = useState(false);
  const [saving, setSaving] = useState(false);
  const [form, setForm] = useState({ contrato_id:'', entrenador_id:'', fecha:HOY_STR(), cantidad:1, pago_usd:0, nota:'' });
  const IS = { padding:'9px 12px', background:'var(--bg)', border:'1px solid var(--line)', borderRadius:8, fontSize:13, fontFamily:'inherit', outline:'none', width:'100%' };
  const load = async () => {
    setLoading(true);
    const { data: ct } = await window._sb.from('contratos').select('id,cliente_id,estado,pago_entrenador_usd,entrenador_id,fecha_fin,clientes(nombre),planes(nombre)').eq('canal','PRESENCIAL').eq('estado','activo').order('fecha_fin');
    setContratos(ct||[]);
    const { data: e } = await window._sb.from('entrenadores').select('id,nombre').eq('activo',true).order('nombre');
    setEntrenadores(e||[]);
    const sres = await window._sb.from('sesiones').select('*, clientes(nombre)').order('fecha',{ascending:false});
    if (sres.error) { setNeedsSetup(true); setSesiones([]); } else { setNeedsSetup(false); setSesiones(sres.data||[]); }
    setLoading(false);
  };
  useEffect(()=>{ load(); },[]);
  const contratoSel = contratos.find(c=>c.id===form.contrato_id);
  const sf = (k,v) => setForm(f=>({...f,[k]:v}));
  const onContrato = id => { const c=contratos.find(x=>x.id===id); const rate=c?.pago_entrenador_usd||0; setForm(f=>({...f, contrato_id:id, entrenador_id:c?.entrenador_id||f.entrenador_id, pago_usd: rate ? (Number(f.cantidad)||0)*rate : f.pago_usd })); };
  const onCantidad = v => { const cant=Number(v)||0; const rate=contratoSel?.pago_entrenador_usd||0; setForm(f=>({...f, cantidad:v, pago_usd: rate ? cant*rate : f.pago_usd })); };
  const guardar = async () => {
    if (!form.contrato_id) return;
    setSaving(true);
    const c = contratos.find(x=>x.id===form.contrato_id);
    const cant = Number(form.cantidad)||0;
    const pago = (c?.pago_entrenador_usd||0) * cant;   // se calcula solo con la tarifa por sesión
    await window._sb.from('sesiones').insert({ cliente_id:c?.cliente_id, contrato_id:form.contrato_id, entrenador_id:form.entrenador_id||c?.entrenador_id||null, fecha:form.fecha, cantidad:cant, pago_usd:pago, nota:form.nota||null });
    setSaving(false); setForm({ contrato_id:'', entrenador_id:'', fecha:HOY_STR(), cantidad:1, pago_usd:0, nota:'' }); load();
  };
  const borrar = async id => { if(!confirm('¿Eliminar este registro de sesiones?')) return; await window._sb.from('sesiones').delete().eq('id',id); load(); };
  const consumidas = cid => sesiones.filter(s=>s.contrato_id===cid).reduce((a,s)=>a+(s.cantidad||0),0);
  const now=new Date();
  const mesPagado = sesiones.filter(s=>{ const d=s.fecha?new Date(s.fecha+'T00:00:00'):null; return d&&d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth(); }).reduce((a,s)=>a+(s.pago_usd||0),0);
  const weekAgo = new Date(now); weekAgo.setDate(now.getDate()-7);
  const semPagado = sesiones.filter(s=>{ const d=s.fecha?new Date(s.fecha+'T00:00:00'):null; return d&&d>=weekAgo&&d<=now; }).reduce((a,s)=>a+(s.pago_usd||0),0);

  return (
    <div className="page">
      <div className="page-header">
        <div><div className="page-eyebrow">Negocio · Presencial</div><h1 className="page-title">Sesiones <span className="italic">presenciales</span></h1></div>
      </div>
      {needsSetup ? (
        <div className="panel"><div className="panel-body" style={{padding:30}}>
          <p style={{fontSize:14,color:'var(--ink-dim)'}}>Falta un paso de base de datos para activar las sesiones. Pega el SQL que te paso al final del mensaje en Supabase y recarga.</p>
        </div></div>
      ) : (<>
        <div className="kpi-grid">
          <KpiCard label="A pagar esta semana" value={`$${Math.round(semPagado)}`} unit="" icon="money" sub="Sesiones registradas (7 días)"/>
          <KpiCard label="A pagar este mes" value={`$${Math.round(mesPagado)}`} unit="" icon="money" sub={MONTHS_LONG[now.getMonth()]}/>
          <KpiCard label="Clientes presenciales" value={contratos.length} unit="" icon="users" sub="activos"/>
        </div>

        <div className="panel">
          <div className="panel-head"><h2 className="panel-title">Registrar <span className="italic">parte de sesiones</span></h2></div>
          <div className="panel-body">
            <div style={{display:'grid',gridTemplateColumns:'2fr 1.4fr 1fr 0.8fr auto',gap:12,alignItems:'end'}}>
              <div><FLbl t="Cliente"/><select value={form.contrato_id} onChange={e=>onContrato(e.target.value)} style={IS}><option value="">— Cliente —</option>{contratos.map(c=><option key={c.id} value={c.id}>{c.clientes?.nombre} · {c.planes?.nombre}</option>)}</select></div>
              <div><FLbl t="Entrenador"/><select value={form.entrenador_id} onChange={e=>sf('entrenador_id',e.target.value)} style={IS}><option value="">—</option>{entrenadores.map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}</select></div>
              <div><FLbl t="Fecha"/><input type="date" value={form.fecha} onChange={e=>sf('fecha',e.target.value)} style={IS}/></div>
              <div><FLbl t="Sesiones hechas"/><input type="number" value={form.cantidad} onChange={e=>sf('cantidad',e.target.value)} style={IS}/></div>
              <button onClick={guardar} disabled={saving||!form.contrato_id} style={{padding:'10px 16px',background:'var(--ink)',color:'#fff',borderRadius:8,fontSize:13,fontWeight:600,border:'none',cursor:'pointer',height:38}}>{saving?'…':'Registrar'}</button>
            </div>
            <div style={{marginTop:8,fontSize:12,color:'var(--ink-faint)'}}>Solo registras las sesiones hechas (se descuentan del plan). El pago a Adrián se calcula solo con la tarifa por sesión del cliente y se acumula para pagarlo a fin de mes.</div>
          </div>
        </div>

        <div className="panel">
          <div className="panel-head"><h2 className="panel-title">Control <span className="italic">por cliente</span></h2><span className="panel-sub">sesiones del plan</span></div>
          <div className="table-wrap">
            {loading ? <div className="loading">Cargando…</div> : (
              <table className="data-table">
                <thead><tr><th>Cliente</th><th>Plan</th><th style={{textAlign:'right'}}>Plan</th><th style={{textAlign:'right'}}>Hechas</th><th style={{textAlign:'right'}}>Restantes</th><th>Vence</th></tr></thead>
                <tbody>
                  {contratos.length===0 ? <tr><td colSpan={6} style={{padding:24,textAlign:'center',color:'var(--ink-faint)'}}>Sin clientes presenciales activos.</td></tr> : contratos.map(c=>{
                    const tot=sesionesPlan(c.planes?.nombre), hechas=consumidas(c.id), rest=tot-hechas;
                    return (
                      <tr key={c.id}>
                        <td className="name">{c.clientes?.nombre}</td>
                        <td style={{fontSize:12}}>{c.planes?.nombre||'—'}</td>
                        <td style={{textAlign:'right',fontFamily:'var(--font-mono)'}}>{tot||'—'}</td>
                        <td style={{textAlign:'right',fontFamily:'var(--font-mono)'}}>{hechas}</td>
                        <td style={{textAlign:'right',fontFamily:'var(--font-mono)',fontWeight:600,color:rest<=2?'var(--neg)':'var(--ink)'}}>{tot?rest:'—'}{tot&&rest<=2?' ⚠️':''}</td>
                        <td className="date" style={{fontSize:12}}>{c.fecha_fin||'—'}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )}
          </div>
        </div>

        <div className="panel">
          <div className="panel-head"><h2 className="panel-title">Historial de <span className="italic">sesiones</span></h2><span className="panel-sub">{sesiones.length} registros</span></div>
          <div className="table-wrap">
            <table className="data-table">
              <thead><tr><th>Fecha</th><th>Cliente</th><th style={{textAlign:'right'}}>Sesiones</th><th style={{textAlign:'right'}}>Pago $</th><th>Nota</th><th style={{width:50}}></th></tr></thead>
              <tbody>
                {sesiones.length===0 ? <tr><td colSpan={6} style={{padding:24,textAlign:'center',color:'var(--ink-faint)'}}>Aún no hay sesiones registradas.</td></tr> : sesiones.map(s=>(
                  <tr key={s.id}><td className="date">{s.fecha}</td><td className="name">{s.clientes?.nombre||'—'}</td><td style={{textAlign:'right',fontFamily:'var(--font-mono)'}}>{s.cantidad}</td><td style={{textAlign:'right',fontFamily:'var(--font-mono)'}}>${s.pago_usd||0}</td><td style={{fontSize:12,color:'var(--ink-faint)'}}>{s.nota||'—'}</td><td style={{textAlign:'right'}}><button className="ghost-btn" style={{color:'var(--neg)',padding:'3px 7px'}} onClick={()=>borrar(s.id)}>✕</button></td></tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </>)}
    </div>
  );
};

        data = r.data;
        if (data && !data.user_id) {
          await window._sb.from('perfiles').update({ user_id: u.id }).eq('email', u.email);
          data = { ...data, user_id: u.id };
        }
      }
      setPerfil(data);
      // Corregir la ruta SOLO la primera vez (al entrar). En refrescos de token
      // (al volver a la pestaña) NO se toca la ruta, para no sacar al usuario de donde está.
      if (data && !routeCorrected) {
        routeCorrected = true;
        const allowed = getNavForRole(data.rol).flatMap(g => g.items.map(i => i.id));
        const keep = cur => allowed.includes(cur) || cur.startsWith('clientes/') || cur.startsWith('clientes-ent/');
        setRoute(cur => keep(cur) ? cur : (getNavForRole(data.rol)[0]?.items[0]?.id || 'delivery/clientes'));
      }
    };

    let routeCorrected = false;
    window._sb.auth.getSession().then(({data:{session}})=>{
      const u = session?.user||null;
      setUser(u);
      if (u) loadPerfil(u);
      setChecking(false);
    });
    const { data: { subscription } } = window._sb.auth.onAuthStateChange((event,session)=>{
      // Ignorar refrescos de token (no cambian quién eres, solo renuevan la sesión).
      if (event === 'TOKEN_REFRESHED') return;
      const u = session?.user||null;
      setUser(prev => prev?.id === u?.id ? prev : u);
      if (u) loadPerfil(u);
      else setPerfil(null);
    });
    return ()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    localStorage.setItem('af_route', route);
    document.querySelector('.main')?.scrollTo(0,0);
  },[route]);

  const logout = async ()=>{ await window._sb.auth.signOut(); };

  if (checking) return <div className="loading" style={{height:'100vh'}}>Cargando…</div>;
  if (!user) return <Login onLogin={setUser}/>;

  const renderPage = () => {
    switch(route) {
      case 'dashboard/general': return <DashboardGeneral/>;
      case 'dashboard/online': return <DashboardCanal canal="ONLINE" nombre="Online coaching" eyebrow="Online"/>;
      case 'dashboard/presencial': return <DashboardCanal canal="PRESENCIAL" nombre="Presencial studio" eyebrow="Presencial"/>;
      case 'dashboard/skool': return <DashboardCanal canal="SKOOL" nombre="Skool community" eyebrow="Skool"/>;
      case 'clientes/lista': return <ClientesLista setRoute={setRoute} setSelectedCliente={setSelectedCliente}/>;
      case 'clientes/nuevo': return <NuevoCliente setRoute={setRoute}/>;
      case 'clientes/renovar': return <RenovarModal asPage cliente={selectedCliente} onClose={()=>setRoute(selectedCliente?'clientes/ficha':'clientes/lista')} onSaved={()=>setRoute(selectedCliente?'clientes/ficha':'clientes/lista')}/>;
      case 'clientes/upgrade': return <UpgradeModal asPage cliente={selectedCliente} onClose={()=>setRoute(selectedCliente?'clientes/ficha':'clientes/lista')} onSaved={()=>setRoute(selectedCliente?'clientes/ficha':'clientes/lista')}/>;
      case 'clientes/baja': return <BajaModal asPage cliente={selectedCliente} onClose={()=>setRoute(selectedCliente?'clientes/ficha':'clientes/lista')} onSaved={()=>setRoute('clientes/lista')}/>;
      case 'clientes/ficha': return <FichaCliente cliente={selectedCliente} setRoute={setRoute} onClienteUpdated={()=>setSelectedCliente(c=>c?{...c,activo:false}:c)}/>;
      case 'clientes/sesiones': return <SesionesPresenciales/>;
      case 'clientes/vencimientos': return <Vencimientos setRoute={setRoute} setSelectedCliente={setSelectedCliente}/>;
      case 'clientes/etiquetas': return <EtiquetasClientes setRoute={setRoute} setSelectedCliente={setSelectedCliente}/>;
      case 'clientes/formulario': return <FormularioClientes setRoute={setRoute}/>;
      case 'clientes-ent/lista': return <ClientesListaEntrenador setRoute={setRoute} setSelectedCliente={setSelectedCliente}/>;
      case 'clientes-ent/vencimientos': return <Vencimientos setRoute={setRoute} setSelectedCliente={setSelectedCliente}/>;
      case 'clientes-ent/etiquetas': return <EtiquetasClientes setRoute={setRoute} setSelectedCliente={setSelectedCliente}/>;
      case 'delivery/clientes': return <DeliveryClientes setRoute={setRoute} setSelectedCliente={setSelectedCliente}/>;
      case 'delivery/entregas': return <DeliveryEntregas/>;
      case 'entrenador/clientes': return <EntrenadorClientes entrenadorId={perfil?.entrenador_id}/>;
      case 'entrenador/sesiones': return <EntrenadorSesiones entrenadorId={perfil?.entrenador_id}/>;
      case 'equipo/entrenadores': return <EquipoTabla tipo="entrenadores"/>;
      case 'equipo/setters': return <EquipoTabla tipo="setters"/>;
      case 'equipo/closers': return <ComisionesClosers/>;
      case 'equipo/editores': return <EditoresVideo/>;
      case 'libreria/programas': return <Programas/>;
      case 'equipo/roles': return <RolesPermisos/>;

      case 'economia/facturacion': return <EconomiaFacturacion/>;
      case 'economia/gastos': return <EconomiaGastos/>;
      case 'economia/comisiones-entrenadores': return <ComisionesEntrenadores/>;
      case 'economia/comisiones-setters': return <ComisionesSetters/>;
      case 'economia/comisiones-closers': return <ComisionesClosers/>;
      case 'ajustes/servicios': return <Programas/>;
      default: return <GenericEmpty route={route}/>;
    }
  };

  const canEdit = perfil && ['founder','admin'].includes(perfil.rol);   // Eric edita; Alex (CEO) no.
  const canView = perfil && ['founder','admin','ceo'].includes(perfil.rol);
  const showPanel = canView;
  return (
    <div className={'app'+(showPanel?' has-panel':'')}>
      <Sidebar route={route} setRoute={setRoute} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen} user={user} onLogout={logout} perfil={perfil}/>
      <main className="main">
        <Topbar route={route} onMenu={()=>setMobileOpen(true)} setRoute={setRoute} showActions={canEdit} setSelectedCliente={setSelectedCliente}/>
        {renderPage()}
      </main>
      {showPanel && <MetricsPanel/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
